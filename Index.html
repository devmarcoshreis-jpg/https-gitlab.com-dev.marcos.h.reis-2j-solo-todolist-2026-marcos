<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List - Reis</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="/javaScript.js"></script>
</head>

<body>
  <main class="bg-yellow-200 flex flex-row h-screen space-2">
    <section id="listaTarefas" class="bg-gray-500 m-4 w-2/3 grid grid-cols-3 grid-rows-4 gap-4 p-2">
      <div class="group grid grid-rows bg-gray-200 rounded-xl p-2 h-35">
        <span class="grid text-center text-2xl my-1 font-bold">Tarefa 1</span>
        <div class="hidden group-hover:flex">
          <button><i class="bg-blue-400 rounded-full py-1 size-8" data-lucide="pencil"></i></button>
          <button><i class="bg-green-400 rounded-full py-1 size-8" data-lucide="check"></i></button>
          <button><i class="bg-red-400 rounded-full py-1 size-8" data-lucide="trash"></i></button>
        </div>
      </div>
      <div class="group grid grid-rows bg-gray-200 rounded-xl p-2 h-35">
        <span class="grid text-center text-2xl my-1 font-bold">Tarefa 2</span>
        <div class="hidden group-hover:flex">
          <button><i class="bg-blue-400 rounded-full py-1 size-8" data-lucide="pencil"></i><span></span></button>
          <button><i class="bg-green-400 rounded-full py-1 size-8" data-lucide="check"></i></button>
          <button><i class="bg-red-400 rounded-full py-1 size-8" data-lucide="trash"></i></button>
        </div>
      </div>
      <div class="group grid grid-rows bg-gray-200 rounded-xl p-2 h-35">
        <span class="grid text-center text-2xl my-1 font-bold">Lista 1</span>
        <p>Esta é a descrição do item</p>
        <div class="hidden group-hover:flex hover:fit-content">
          <button><i class="bg-blue-400 rounded-full py-1 size-8" data-lucide="pencil"></i></button>
          <button><i class="bg-red-400 rounded-full py-1 size-8" data-lucide="trash"></i></button>
        </div>
      </div>
      <div class="group hover: grid grid-rows bg-gray-200 rounded-xl p-2 h-35">
        <span class="grid text-center text-2xl my-1 font-bold">Meta 1</span>
          <p>Total de etapas: 4</p>
          <progress class="w-full" value="25" max="100"></progress>
        <div class="hidden group-hover:flex">
          <button><i class="bg-blue-400 rounded-full py-1 size-8" data-lucide="pencil"></i></button>
          <button><i class="bg-red-400 rounded-full py-1 size-8" data-lucide="trash"></i></button>
          
        </div>
      </div>
      <div class="group grid grid-rows bg-gray-200 rounded-xl p-2 h-35 display">
        <span class="grid text-center text-2xl my-1 font-bold">Tarefa 3</span>
        <div class="hidden group-hover:flex">
          <button><i class="bg-blue-400 rounded-full py-1 size-8" data-lucide="pencil"></i></button>
          <button><i class="bg-green-400 rounded-full py-1 size-8" data-lucide="check"></i></button>
          <button><i class="bg-red-400 rounded-full py-1 size-8" data-lucide="trash"></i></button>
        </div>
      </div>
    </section>
    <section id="formTarefas" class="bg-purple-200 w-1/3 m-4 flex flex-col justify-between p-4">
      <form action="" class="bg-blue-200 border-1 rounded-full p-1 flex flex-row justify-between">
        <label class="pr-2" for="busca"><i data-lucide="search"></i></label>
        <input type="search" class=" w-full  border-1 justify-self-stretch" placeholder="Buscar tarefa">
        <input  type="submit" value="Buscar" class="w-1/4 block px-2 rounded-full bg-blue-400">
      </form>
        <div id="campoBotao" class="bg-orange-100 w-full h-35 grid grid-rows justify-center items-center ">
          <span>Adicionar nova...</span>
          <button class="bg-purple-400 flex justify-center items-center w-30 h-10 rounded-full">
            <i class="size-10" data-lucide="plus"></i>
          </button>
        </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/lucide@1.7.0/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>

</html>
